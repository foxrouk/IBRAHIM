<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Men Fashion Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOGO -->
<div class="logo-box">
  <h1>Men Fashion Store</h1>
</div>

<!-- ملابس شباب -->
<div class="category">👕 ملابس شباب</div>

<div class="products">

<!-- تيشيرت -->
<div class="product">
<div class="promo">-30%</div>
<div class="like">❤</div>

<img src="images/tshirt.jpg">

<div class="content">
<h3>تيشيرت رجالي</h3>
<div class="price">
<span class="old">3000</span>
<span class="new">2100 دج</span>
</div>
</div>

</div>

<!-- جينز -->
<div class="product">
<div class="promo">-20%</div>
<div class="like">❤</div>

<img src="images/jeans.jpg">

<div class="content">
<h3>جينز رجالي</h3>
<div class="price">
<span class="old">5000</span>
<span class="new">4000 دج</span>
</div>
</div>

</div>

<!-- جاكيت -->
<div class="product">
<div class="promo">-40%</div>
<div class="like">❤</div>

<img src="images/jacket.jpg">

<div class="content">
<h3>جاكيت شبابي</h3>
<div class="price">
<span class="old">8000</span>
<span class="new">4800 دج</span>
</div>
</div>

</div>

<!-- حذاء -->
<div class="product">
<div class="promo">-25%</div>
<div class="like">❤</div>

<img src="images/shoes.jpg">

<div class="content">
<h3>حذاء رياضي</h3>
<div class="price">
<span class="old">6000</span>
<span class="new">4500 دج</span>
</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
