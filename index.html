<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Men Fashion Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  background:#f5f5f5;
  margin:0;
  padding:0;
}

.logo-box{
  text-align:center;
  background:#111;
  color:white;
  padding:20px;
}

.category{
  margin:20px;
  font-size:22px;
  font-weight:bold;
}

.products{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.product{
  width:200px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:10px;
  text-align:center;
}

.price .old{
  text-decoration:line-through;
  color:red;
  margin-left:5px;
}

.price .new{
  color:green;
  font-weight:bold;
}

.promo{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px;
  font-size:12px;
  border-radius:5px;
}

.like{
  position:absolute;
  top:10px;
  left:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- LOGO -->
<div class="logo-box">
  <h1>Men Fashion Store</h1>
</div>

<!-- قسم الملابس -->
<div class="category">👕 ملابس شباب</div>

<div class="products">

<!-- تيشيرت -->
<div class="product">
<div class="promo">-30%</div>
<div class="like">❤</div>
<img src="images/tshirt.jpg">
<div class="content">
<h3>تيشيرت رجالي</h3>
<div class="price">
<span class="old">3000</span>
<span class="new">2100 دج</span>
</div>
</div>
</div>

<!-- جينز -->
<div class="product">
<div class="promo">-20%</div>
<div class="like">❤</div>
<img src="images/jeans.jpg">
<div class="content">
<h3>جينز رجالي</h3>
<div class="price">
<span class="old">5000</span>
<span class="new">4000 دج</span>
</div>
</div>
</div>

<!-- جاكيت -->
<div class="product">
<div class="promo">-40%</div>
<div class="like">❤</div>
<img src="images/jacket.jpg">
<div class="content">
<h3>جاكيت شبابي</h3>
<div class="price">
<span class="old">8000</span>
<span class="new">4800 دج</span>
</div>
</div>
</div>

<!-- حذاء -->
<div class="product">
<div class="promo">-25%</div>
<div class="like">❤</div>
<img src="images/shoes.jpg">
<div class="content">
<h3>حذاء رياضي</h3>
<div class="price">
<span class="old">6000</span>
<span class="new">4500 دج</span>
</div>
</div>
</div>

</div>

</body>
</html>
